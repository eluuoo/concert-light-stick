<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somatic Synchrony</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="ui-container">
        <h1 id="title">concert light stick</h1>
        <button id="entry-btn">INITIALIZE SENSORS</button>
        <p id="status">Waiting for connection...</p>
    </div>

    <script>
        let socket;
        let ripples = [];
        let myHue;
        let stageHue = 280;
        let isActive = false;
        let lastAcc = { x: 0, y: 0, z: 0 };

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 1);
            myHue = random(180, 320); // Each user is initially assigned a unique color palette
            socket = io();

            socket.on("collective-ripple", (data) => {
                // Whenever any device sends a shaking signal, dynamic ripples will be generated on the screen
                ripples.push(new Ripple(data.originX * width / 100, data.originY * height / 100, data.hue, data.force));
            });

            socket.on("stage-state", (data) => {
                stageHue = data.baseHue;
            });

            document.getElementById('entry-btn').onclick = startApp;
        }

        async function startApp() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res === 'granted') window.addEventListener('devicemotion', handleMotion);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
            isActive = true;
            document.getElementById('ui-container').style.opacity = '0';
            setTimeout(() => document.getElementById('ui-container').remove(), 1000);
        }

        function handleMotion(e) {
            let acc = e.accelerationIncludingGravity;
            let delta = abs(acc.x - lastAcc.x) + abs(acc.y - lastAcc.y) + abs(acc.z - lastAcc.z);

            if (delta > 25) { // Shaking threshold
                myHue = (myHue + 10) % 360; // Shaking changes its own color
                socket.emit("shake-data", { hue: myHue, force: delta });
            }
            lastAcc = { x: acc.x, y: acc.y, z: acc.z };
        }

        function draw() {

            background(stageHue, 80, 5, 0.1);

            // Draw the support stick 
            drawSomaticGlow();
        }

        for (let i = ripples.length - 1; i >= 0; i--) {
            ripples[i].update();
            ripples[i].display();
            if (ripples[i].life <= 0) ripples.splice(i, 1);
        }


        function drawSomaticGlow() {
            push();
            translate(width / 2, height / 2);
            // Dynamic support stick visual: Generative luminescence from the inside out
            for (let i = 0; i < 6; i++) {
                let size = map(i, 0, 5, 200, 50);
                let alpha = map(i, 0, 5, 0.1, 0.8);
                fill(myHue, 80, 100, alpha);
                noStroke();
                drawingContext.shadowBlur = 40;
                drawingContext.shadowColor = color(myHue, 90, 100);
                rectMode(CENTER);
                rect(0, 0, size * 0.3, size, 50);
            }
            pop();
        }

        class Ripple {
            constructor(x, y, h, f) {
                this.x = x; this.y = y; this.hue = h;
                this.life = 1.0;
                this.vel = f * 0.5;
                this.size = 0;
            }
            update() {
                this.size += this.vel;
                this.life -= 0.01;
            }
            display() {
                noFill();
                strokeWeight(this.life * 10);
                stroke(this.hue, 90, 100, this.life);
                ellipse(this.x, this.y, this.size);
            }
        }
    </script>
</body>

</html>
